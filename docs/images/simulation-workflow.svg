<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">abaqus-agent simulation workflow</title>
  <desc id="desc">Workflow from natural language prompt to template, model spec, validation, Abaqus job execution and ODB report.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef6f8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1180" height="560" rx="28" fill="url(#bg)"/>
  <text x="58" y="66" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="800" fill="#0f172a">Agent simulation workflow</text>
  <text x="58" y="98" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#475569">A repeatable loop for building, checking, solving and reporting Abaqus models.</text>

  <g filter="url(#shadow)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect x="58" y="160" width="150" height="108" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="248" y="160" width="150" height="108" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="438" y="160" width="150" height="108" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="628" y="160" width="150" height="108" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="818" y="160" width="150" height="108" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="1008" y="160" width="114" height="108" rx="18" fill="#ffffff" stroke="#dbe3ef"/>

    <rect x="165" y="354" width="160" height="112" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="394" y="354" width="160" height="112" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="623" y="354" width="160" height="112" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="852" y="354" width="160" height="112" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  </g>

  <g font-family="Inter,Segoe UI,Arial,sans-serif" text-anchor="middle">
    <text x="133" y="202" font-size="18" font-weight="800" fill="#0f172a">Prompt</text>
    <text x="133" y="232" font-size="13" fill="#64748b">natural language</text>

    <text x="323" y="202" font-size="18" font-weight="800" fill="#0f172a">Template</text>
    <text x="323" y="232" font-size="13" fill="#64748b">TSV / BGA / contact</text>

    <text x="513" y="202" font-size="18" font-weight="800" fill="#0f172a">Model Spec</text>
    <text x="513" y="232" font-size="13" fill="#64748b">JSON contract</text>

    <text x="703" y="202" font-size="18" font-weight="800" fill="#0f172a">Dry Run</text>
    <text x="703" y="232" font-size="13" fill="#64748b">missing items + risks</text>

    <text x="893" y="202" font-size="18" font-weight="800" fill="#0f172a">Build</text>
    <text x="893" y="232" font-size="13" fill="#64748b">parts, materials, steps</text>

    <text x="1065" y="202" font-size="18" font-weight="800" fill="#0f172a">Mesh</text>
    <text x="1065" y="232" font-size="13" fill="#64748b">seed + elements</text>

    <text x="245" y="400" font-size="18" font-weight="800" fill="#0f172a">Validate</text>
    <text x="245" y="430" font-size="13" fill="#64748b">errors, warnings, hints</text>

    <text x="474" y="400" font-size="18" font-weight="800" fill="#0f172a">Solve</text>
    <text x="474" y="430" font-size="13" fill="#64748b">input, async job, status</text>

    <text x="703" y="400" font-size="18" font-weight="800" fill="#0f172a">Diagnose</text>
    <text x="703" y="430" font-size="13" fill="#64748b">sta/msg/dat parsing</text>

    <text x="932" y="400" font-size="18" font-weight="800" fill="#0f172a">Report</text>
    <text x="932" y="430" font-size="13" fill="#64748b">ODB fields + images</text>
  </g>

  <g stroke="#0f172a" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M210 214h31"/>
    <path d="M400 214h31"/>
    <path d="M590 214h31"/>
    <path d="M780 214h31"/>
    <path d="M970 214h31"/>
    <path d="M1065 268c0 70-52 118-143 118"/>
    <path d="M852 410h-62"/>
    <path d="M623 410h-62"/>
    <path d="M394 410h-62"/>
  </g>

  <path d="M690 466c-20 48-116 68-216 32-83-30-126-32-180-14" stroke="#14b8a6" stroke-width="4" fill="none" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="492" y="520" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#0f766e">If diagnostics fail, revise the spec and rerun the loop</text>
</svg>
