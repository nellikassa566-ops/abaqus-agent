<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">abaqus-agent architecture</title>
  <desc id="desc">Architecture diagram showing an AI agent connected to Abaqus CAE through MCP and file based IPC.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e8eef7"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1180" height="520" rx="28" fill="url(#bg)"/>
  <text x="62" y="64" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="700" fill="#0f172a">abaqus-agent</text>
  <text x="62" y="98" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#475569">Natural language to structured Abaqus simulation, with MCP, templates, validation, jobs and ODB post-processing.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="155" width="210" height="150" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="485" y="155" width="210" height="150" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="910" y="155" width="210" height="150" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="370" y="350" width="440" height="92" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  </g>

  <circle cx="106" cy="206" r="22" fill="#dbeafe"/>
  <path d="M95 208c10-22 24-22 34 0M98 218h28M107 190h12" stroke="#2563eb" stroke-width="5" stroke-linecap="round" fill="none"/>
  <text x="88" y="255" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" fill="#0f172a">AI Agent</text>
  <text x="88" y="282" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#64748b">Codex / Cursor / Claude</text>

  <rect x="528" y="184" width="82" height="50" rx="12" fill="url(#blue)"/>
  <path d="M543 209h52M543 222h36M543 196h52" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <text x="525" y="255" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" fill="#0f172a">MCP Server</text>
  <text x="520" y="282" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#64748b">JSON schema + command router</text>

  <path d="M960 190h82l28 28v58H960z" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <path d="M1042 190v28h28" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="954" y="255" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" fill="#0f172a">Abaqus/CAE</text>
  <text x="946" y="282" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#64748b">Plugin executes Abaqus Python</text>

  <path d="M282 230h190" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M705 230h190" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M895 258h-190" stroke="#64748b" stroke-width="2" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <path d="M472 258H282" stroke="#64748b" stroke-width="2" stroke-dasharray="7 7" marker-end="url(#arrow)"/>

  <text x="326" y="213" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#334155">MCP tools</text>
  <text x="750" y="213" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#334155">file IPC</text>
  <text x="740" y="282" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#64748b">results / status</text>
  <text x="333" y="282" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#64748b">structured responses</text>

  <text x="410" y="388" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Shared working directory</text>
  <text x="410" y="418" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#475569">commands/*.json  |  results/*.json  |  status.json  |  transactions/  |  screenshots/</text>

  <path d="M590 305v34" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1015 305c0 100-130 126-220 96" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
</svg>
